# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    rm_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

rm_group_controller:
  ros__parameters:
    joints:
      - ${prefix}joint1
      - ${prefix}joint2
      - ${prefix}joint3
      - ${prefix}joint4
      - ${prefix}joint5
      - ${prefix}joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity